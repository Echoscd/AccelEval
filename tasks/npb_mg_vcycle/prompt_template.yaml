task: npb_mg_vcycle
summary: >
  Implement a GPU solution for a structured-grid 3D multigrid V-cycle benchmark.
  The task applies repeated V-cycles to a Poisson-like system with zero Dirichlet boundaries.

inputs:
  - rhs: float64[(interior_n+2)^3], row-major 3D grid with boundary cells included
  - params: interior_n, num_cycles, pre_smooth, post_smooth, coarse_iters

output:
  - residual_l2_norm: float64[1]

notes:
  - Preserve the CPU reference semantics.
  - The main kernels are smoothing, residual computation, restriction, prolongation, and coarse solve.
  - Exploit bulk pointwise parallelism across the 3D grid.

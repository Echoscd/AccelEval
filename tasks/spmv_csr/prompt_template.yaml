# CSR Sparse Matrix-Vector Multiply -- Prompt Template

task_description: |
  Compute y = A x for a sparse square matrix A stored in compressed sparse row (CSR) format.

  The matrix is represented by:
    - row_ptr: length N+1
    - col_idx: length nnz
    - vals: length nnz
  and a dense vector x of length N.

  For each row i:
    y[i] = sum_{k = row_ptr[i]}^{row_ptr[i+1]-1} vals[k] * x[col_idx[k]]

interface: |
  ```c
  // Called once. Receives the CSC matrix (col_ptrs, row_indices, values)
  // and the dense input vector. Implementation should allocate device memory
  // and copy inputs to device.
  extern "C" void solution_init(
      int num_rows,                // number of rows of A
      int num_cols,                // number of cols of A
      const int* col_ptrs,         // host, [num_cols+1], CSC column pointers
      const int* row_indices,      // host, [nnz], CSC row indices
      const float* values,         // host, [nnz], CSC values
      const float* vector          // host, [num_rows], dense input vector x
  );

  // Called multiple times. Computes answer = A^T * vector (length num_cols).
  // Must be idempotent and synchronize before returning.
  extern "C" void solution_compute(
      int num_cols,
      float* answer                // host, [num_cols], output
  );
  ```

  You MUST implement both `solution_init` and `solution_compute`.
  (`solution_free` is optional — the framework provides a no-op default.)

input_size_notes: |
  - small:  N = 4,096,   16 nonzeros per row
  - medium: N = 32,768,  24 nonzeros per row
  - large:  N = 131,072, 32 nonzeros per row
  - Matrix is square and stored in standard CSR format
  - Output vector length is N

output_contract: |
  - `y` must contain exactly the dense result of the CSR SpMV operation
  - Output length is N, one value per row
  - The function must be idempotent and synchronize before returning

algorithm_background: |
  CSR SpMV is one of the standard sparse linear algebra kernels.
  Each row accumulates a dot product over its nonzeros:

    sum = 0
    for k in [row_ptr[i], row_ptr[i+1]):
        sum += vals[k] * x[col_idx[k]]
    y[i] = sum

  The arithmetic intensity is low, so performance is often limited by memory bandwidth
  and irregular access to x through col_idx.

hints_l2: |
  - Copy all CSR arrays and x to device memory at the start of `solution_compute`
  - Launch a kernel that maps rows to threads or warps
  - Accumulate each row independently
  - Copy y back to host at the end

hints_l1: |
  ### 1. Basic row-parallel mapping
  A simple baseline is one thread per row. Each thread loops over the row's CSR slice and
  accumulates the dot product.

  ### 2. Row boundaries
  The nonzeros for row i are in the half-open interval [row_ptr[i], row_ptr[i+1]).

  ### 3. Irregular access pattern
  Accesses to x are indirect through col_idx. This kernel is usually memory-bandwidth bound.

  ### 4. More advanced optimization
  For long rows, consider one warp per row with warp-level reduction, but a correct one-thread-per-row
  implementation is an acceptable baseline.

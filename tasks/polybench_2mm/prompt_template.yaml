task: polybench_2mm
summary: >
  Implement a GPU solution for the PolyBench 2MM benchmark. First compute
  tmp = alpha * A * B, then compute D = tmp * C + beta * D0.

inputs:
  - A: float32[ni*nk]
  - B: float32[nk*nj]
  - C: float32[nj*nl]
  - D0: float32[ni*nl]
  - params: ni, nj, nk, nl, alpha_milli, beta_milli

output:
  - D: float32[ni*nl]

notes:
  - Preserve row-major semantics exactly.
  - Alpha and beta are provided as integers scaled by 1000.
  - The computation is two-stage: tmp = alpha*A*B, then D = tmp*C + beta*D0.
  - Output must match the CPU reference within the configured numeric tolerance.
  - Both stages are GEMM-like and should benefit from standard GPU tiling strategies.

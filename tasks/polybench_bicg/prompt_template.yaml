task: polybench_bicg
summary: >
  Implement a GPU solution for the PolyBench BiCG benchmark. Compute both
  output vectors exactly as in the reference kernel: q = A * p and s = A^T * r.

inputs:
  - A: float32[n*m]
  - p: float32[m]
  - r: float32[n]
  - params: n, m

output:
  - s: float32[m]
  - q: float32[n]

notes:
  - Preserve row-major semantics exactly.
  - The text output writes all entries of s first, then all entries of q.
  - Output must match the CPU reference within the configured numeric tolerance.
  - A GPU solution may compute q and s in separate kernels or with a carefully designed fused strategy.

task: polybench_atax
summary: >
  Implement a GPU solution for the PolyBench ATAX benchmark. Compute the
  two-stage dense linear algebra kernel exactly as in the reference version:
  tmp = A * x, then y = A^T * tmp.

inputs:
  - A: float32[m*n]
  - x: float32[n]
  - params: m, n

output:
  - y: float32[n]

notes:
  - Preserve row-major semantics exactly.
  - The computation must match PolyBench/C's ATAX structure: first compute
    tmp = A*x, then compute y = A^T*tmp.
  - Output must match the CPU reference within the configured numeric tolerance.
  - Good GPU strategies include row-parallel matrix-vector multiply,
    transpose-aware accumulation, memory coalescing, and careful reuse of x and tmp.

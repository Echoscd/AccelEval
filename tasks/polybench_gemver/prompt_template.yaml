task: polybench_gemver
summary: >
  Implement a GPU solution for the PolyBench GEMVER benchmark. Follow the
  reference computation exactly: first update A = A + u1*v1^T + u2*v2^T, then
  compute x = beta * A^T * y + z, and finally w = alpha * A * x.

inputs:
  - A: float32[n*n]
  - u1: float32[n]
  - v1: float32[n]
  - u2: float32[n]
  - v2: float32[n]
  - y: float32[n]
  - z: float32[n]
  - params: n

output:
  - w: float32[n]

notes:
  - Use PolyBench/C GEMVER constants alpha=1.5 and beta=1.2.
  - Preserve row-major semantics exactly.
  - The matrix update must occur before both matrix-vector phases.
  - The output must match the CPU reference within the configured numeric tolerance.
  - Good GPU strategies include a 2D matrix-update kernel, transpose-aware reduction
    for A^T * y, and a row-parallel A * x kernel.

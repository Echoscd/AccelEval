task: npb_cg_sparse_solve
summary: >
  Implement a GPU solution for a sparse conjugate-gradient benchmark derived from
  the NPB CG kernel. The task repeatedly applies CSR SpMV, dot-product reductions,
  and vector updates to solve a sparse SPD linear system.

inputs:
  - row_ptr: int32[n+1]
  - col_idx: int32[nnz]
  - values: float64[nnz]
  - b: float64[n]
  - params: n, nnz, max_iters, tol_exp

output:
  - x: float64[n]

notes:
  - Preserve the CPU reference semantics.
  - The dominant work is CSR SpMV plus global reductions.
  - Avoid repeated host-device transfers inside the iteration loop.

interface: |
  ```c
  // Single end-to-end call. Do H2D + kernel + D2H and synchronize before returning.
  // Called multiple times (warmup + timed); must be idempotent.
  extern "C" void solution_compute(
      int n,
      int nnz,
      int max_iters,
      int tol_exp,
      const int * row_ptr,
      const int * col_idx,
      const double * values,
      const double * b,
      double * x_out
  );
  ```
